<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seller Detail | BSMS Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script defer src="/assets/js/core/format.js"></script>
  <script defer src="/assets/js/core/mock-data.js"></script>
  <script defer src="/assets/js/core/db.js"></script>
  <script defer src="/assets/js/core/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      if (window.auth && window.auth.requireRole) window.auth.requireRole('admin');
    });
  </script>
  <script defer src="/assets/js/components/topbar.js"></script>
  <script defer src="/assets/js/components/sidebar-admin.js"></script>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8D%94%3C/text%3E%3C/svg%3E" />
  <style>[x-cloak] { display: none !important; }</style>
</head>
<body data-nav="sellers" class="min-h-screen bg-slate-100 text-slate-800 font-sans antialiased">
  <div class="flex min-h-screen">
    <div x-data="sidebarAdmin" x-html="template()"></div>
    <div class="flex-1 flex flex-col min-w-0">
      <header class="bg-white border-b border-slate-200">
        <div class="px-6 py-4 flex items-center justify-between">
          <div class="flex items-center gap-3">
            <a href="/admin/users.html" class="text-slate-500 hover:text-slate-800 text-sm">← Back</a>
            <div>
              <h1 class="text-xl font-semibold text-slate-800">Seller Detail</h1>
              <p class="text-xs text-slate-500">Profile, subscription, leads</p>
            </div>
          </div>
          <div x-data="topbar" x-html="template()"></div>
        </div>
      </header>
      <main class="flex-1 p-6 grid grid-cols-1 lg:grid-cols-3 gap-4">

        <section class="lg:col-span-2 bg-white rounded-xl p-5 border border-slate-200">
          <h2 class="text-sm font-semibold text-slate-700 mb-3">Profile</h2>
          <p class="text-sm text-slate-400">Phase 3 hydrates this from db.users.</p>
        </section>

        <aside class="bg-white rounded-xl p-5 border border-slate-200">
          <h2 class="text-sm font-semibold text-slate-700 mb-3">Actions</h2>
          <div class="space-y-2">
            <button disabled class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm text-slate-400">Suspend</button>
            <button disabled class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm text-slate-400">Reset Password</button>
            <button disabled class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm text-slate-400">Delete</button>
          </div>
        </aside>

        <section class="lg:col-span-3 bg-white rounded-xl p-5 border border-slate-200">
          <h2 class="text-sm font-semibold text-slate-700 mb-3">Subscription History</h2>
          <p class="text-sm text-slate-400">Phase 3 lists subscription rows from db.orders.</p>
        </section>

      </main>
    </div>
  </div>
</body>
</html>
