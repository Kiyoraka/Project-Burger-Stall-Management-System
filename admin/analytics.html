<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analytics | BSMS Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script defer src="/assets/js/core/format.js"></script>
  <script defer src="/assets/js/core/mock-data.js"></script>
  <script defer src="/assets/js/core/db.js"></script>
  <script defer src="/assets/js/core/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      if (window.auth && window.auth.requireRole) window.auth.requireRole('admin');
    });
  </script>
  <script defer src="/assets/js/components/topbar.js"></script>
  <script defer src="/assets/js/components/sidebar-admin.js"></script>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8D%94%3C/text%3E%3C/svg%3E" />
  <style>[x-cloak] { display: none !important; }</style>
</head>
<body data-nav="analytics" class="min-h-screen bg-slate-100 text-slate-800 font-sans antialiased">
  <div class="flex min-h-screen">
    <div x-data="sidebarAdmin" x-html="template()"></div>
    <div class="flex-1 flex flex-col min-w-0">
      <header class="bg-white border-b border-slate-200">
        <div class="px-6 py-4 flex items-center justify-between">
          <div>
            <h1 class="text-xl font-semibold text-slate-800">Analytics</h1>
            <p class="text-xs text-slate-500">Platform-wide trends</p>
          </div>
          <div x-data="topbar" x-html="template()"></div>
        </div>
      </header>
      <main class="flex-1 p-6 space-y-4">

        <div class="flex items-center gap-3">
          <select disabled class="rounded-lg border border-slate-300 px-3 py-2 text-sm disabled:bg-slate-50">
            <option>Last 30 days</option>
          </select>
        </div>

        <section class="bg-white rounded-xl p-5 border border-slate-200">
          <h2 class="text-sm font-semibold text-slate-700 mb-3">New Signups Over Time</h2>
          <div class="h-48 flex items-center justify-center bg-slate-50 rounded-lg text-sm text-slate-400">
            Chart.js wires up in Phase 6
          </div>
        </section>

        <section class="grid grid-cols-1 lg:grid-cols-2 gap-4">
          <div class="bg-white rounded-xl p-5 border border-slate-200">
            <h2 class="text-sm font-semibold text-slate-700 mb-3">Revenue by Month</h2>
            <div class="h-48 flex items-center justify-center bg-slate-50 rounded-lg text-sm text-slate-400">
              Bar chart placeholder
            </div>
          </div>
          <div class="bg-white rounded-xl p-5 border border-slate-200">
            <h2 class="text-sm font-semibold text-slate-700 mb-3">Leads by Source</h2>
            <div class="h-48 flex items-center justify-center bg-slate-50 rounded-lg text-sm text-slate-400">
              Pie chart placeholder
            </div>
          </div>
        </section>

      </main>
    </div>
  </div>
</body>
</html>
