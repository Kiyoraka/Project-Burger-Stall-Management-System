<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard | BSMS Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script defer src="/assets/js/components/topbar.js"></script>
  <script defer src="/assets/js/components/sidebar-admin.js"></script>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8D%94%3C/text%3E%3C/svg%3E" />
  <style>[x-cloak] { display: none !important; }</style>
</head>
<body data-nav="dashboard" class="min-h-screen bg-slate-100 text-slate-800 font-sans antialiased">

  <div class="flex min-h-screen">

    <!-- Sidebar -->
    <div x-data="sidebarAdmin" x-html="template()"></div>

    <!-- Main column -->
    <div class="flex-1 flex flex-col min-w-0">

      <!-- Header -->
      <header class="bg-white border-b border-slate-200">
        <div class="px-6 py-4 flex items-center justify-between">
          <div>
            <h1 class="text-xl font-semibold text-slate-800">Dashboard</h1>
            <p class="text-xs text-slate-500">Platform overview</p>
          </div>
          <div x-data="topbar" x-html="template()"></div>
        </div>
      </header>

      <!-- Content -->
      <main class="flex-1 p-6 space-y-6">

        <!-- KPI grid placeholder -->
        <section class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
          <div class="bg-white rounded-xl p-5 border border-slate-200">
            <p class="text-xs uppercase tracking-wide text-slate-500">Total Sellers</p>
            <p class="mt-1 text-3xl font-bold text-slate-800">—</p>
          </div>
          <div class="bg-white rounded-xl p-5 border border-slate-200">
            <p class="text-xs uppercase tracking-wide text-slate-500">Active Subscriptions</p>
            <p class="mt-1 text-3xl font-bold text-slate-800">—</p>
          </div>
          <div class="bg-white rounded-xl p-5 border border-slate-200">
            <p class="text-xs uppercase tracking-wide text-slate-500">Pending Approval</p>
            <p class="mt-1 text-3xl font-bold text-slate-800">—</p>
          </div>
          <div class="bg-white rounded-xl p-5 border border-slate-200">
            <p class="text-xs uppercase tracking-wide text-slate-500">MRR</p>
            <p class="mt-1 text-3xl font-bold text-slate-800">RM —</p>
          </div>
          <div class="bg-white rounded-xl p-5 border border-slate-200">
            <p class="text-xs uppercase tracking-wide text-slate-500">Affiliate Payout</p>
            <p class="mt-1 text-3xl font-bold text-slate-800">RM —</p>
          </div>
          <div class="bg-white rounded-xl p-5 border border-slate-200">
            <p class="text-xs uppercase tracking-wide text-slate-500">Today's Leads</p>
            <p class="mt-1 text-3xl font-bold text-slate-800">—</p>
          </div>
        </section>

        <!-- Pending approvals + recent activity placeholder -->
        <section class="grid grid-cols-1 lg:grid-cols-2 gap-4">
          <div class="bg-white rounded-xl p-5 border border-slate-200">
            <h2 class="text-sm font-semibold text-slate-700 mb-3">Pending Approvals</h2>
            <p class="text-sm text-slate-400">Phase 3 wires this up.</p>
          </div>
          <div class="bg-white rounded-xl p-5 border border-slate-200">
            <h2 class="text-sm font-semibold text-slate-700 mb-3">Recent Activity</h2>
            <p class="text-sm text-slate-400">Phase 3 wires this up.</p>
          </div>
        </section>

      </main>
    </div>
  </div>
</body>
</html>
