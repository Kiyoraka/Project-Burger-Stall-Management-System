<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | BSMS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script defer src="/assets/js/core/format.js"></script>
  <script defer src="/assets/js/core/mock-data.js"></script>
  <script defer src="/assets/js/core/db.js"></script>
  <script defer src="/assets/js/core/auth.js"></script>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8D%94%3C/text%3E%3C/svg%3E" />
  <style>[x-cloak] { display: none !important; }</style>
</head>
<body class="min-h-screen bg-slate-900 text-slate-800 font-sans antialiased">
  <main class="min-h-screen flex flex-col items-center justify-center px-6 py-12">

    <div class="w-full max-w-sm" x-data="adminLogin()" x-init="init()">

      <div class="text-center mb-6">
        <span class="text-3xl" aria-hidden="true">🛡️</span>
        <h1 class="mt-2 text-2xl font-bold text-white">BSMS Admin</h1>
        <p class="mt-1 text-sm text-slate-400">Platform administration</p>
      </div>

      <!-- Toast: wrong portal redirect -->
      <div x-show="wrongPortal" x-cloak
           class="mb-4 rounded-lg bg-amber-500/15 border border-amber-500/40 px-4 py-3 text-sm text-amber-200">
        You were redirected here because the previous link required admin access.
      </div>

      <!-- Toast: redirected from a guarded page -->
      <div x-show="redirectedFromGuard" x-cloak
           class="mb-4 rounded-lg bg-blue-500/15 border border-blue-500/40 px-4 py-3 text-sm text-blue-200">
        Please sign in to continue.
      </div>

      <form class="bg-white rounded-2xl shadow-xl p-6 space-y-4" @submit.prevent="submit()">

        <div>
          <label for="email" class="block text-sm font-medium text-slate-700 mb-1">Email</label>
          <input id="email" type="email" required autocomplete="email"
                 x-model.trim="email"
                 :disabled="loading"
                 placeholder="admin@bsms.test"
                 class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent disabled:bg-slate-50" />
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Password</label>
          <input id="password" type="password" required autocomplete="current-password"
                 x-model="password"
                 :disabled="loading"
                 placeholder="••••••••"
                 class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent disabled:bg-slate-50" />
        </div>

        <p x-show="error" x-cloak class="text-sm text-red-600" x-text="error"></p>

        <button type="submit"
                :disabled="loading"
                class="w-full rounded-lg bg-orange-600 px-4 py-2.5 text-sm font-semibold text-white hover:bg-orange-700 transition disabled:opacity-60 disabled:cursor-wait">
          <span x-show="!loading">Sign in</span>
          <span x-show="loading" x-cloak>Signing in…</span>
        </button>

        <p class="text-xs text-slate-500 text-center pt-2">
          Demo: <code class="px-1 py-0.5 rounded bg-slate-100">admin@bsms.test / admin123</code>
        </p>
      </form>

      <p class="mt-6 text-center text-sm text-slate-400">
        Wrong portal?
        <a href="/seller/login.html" class="text-orange-400 hover:text-orange-300 underline">Seller →</a>
        <span class="mx-1">·</span>
        <a href="/affiliate/login.html" class="text-orange-400 hover:text-orange-300 underline">Affiliate →</a>
      </p>

      <p class="mt-4 text-center text-xs text-slate-500">
        <a href="/index.html" class="hover:text-slate-300">← Back to home</a>
      </p>
    </div>
  </main>

  <script>
    function adminLogin() {
      return {
        email: '',
        password: '',
        error: '',
        loading: false,
        wrongPortal: false,
        redirectedFromGuard: false,

        init() {
          const params = new URLSearchParams(window.location.search);
          this.wrongPortal = params.get('wrongPortal') === '1';
          this.redirectedFromGuard = params.has('next');
          // If already signed in as admin, skip straight to dashboard
          if (window.auth && window.auth.isAuthed && window.auth.isAuthed()) {
            const me = window.auth.currentUser();
            if (me && me.role === 'admin') {
              this._gotoNext();
            }
          }
        },

        async submit() {
          this.error = '';
          if (!this.email || !this.password) {
            this.error = 'Email and password are required.';
            return;
          }
          this.loading = true;
          try {
            // Make sure seed is in place before login lookup
            if (window.mockData && window.mockData.bootstrap) {
              await window.mockData.bootstrap();
            }
            const session = window.auth.login('admin', this.email, this.password);
            if (!session) {
              this.error = 'Invalid email or password (or this account is suspended).';
              this.loading = false;
              return;
            }
            this._gotoNext();
          } catch (e) {
            console.error(e);
            this.error = 'Something went wrong. Try again.';
            this.loading = false;
          }
        },

        _gotoNext() {
          const params = new URLSearchParams(window.location.search);
          const raw = params.get('next');
          let next = '/admin/dashboard.html';
          if (raw) {
            try {
              const decoded = decodeURIComponent(raw);
              // Only honor same-origin admin paths to avoid open-redirect
              if (decoded.startsWith('/admin/')) next = decoded;
            } catch (e) { /* ignore */ }
          }
          window.location.replace(next);
        }
      };
    }
  </script>
</body>
</html>
