<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings | BSMS Affiliate</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script defer src="/assets/js/components/desktop-blocker.js"></script>
  <script defer src="/assets/js/components/bottomnav-affiliate.js"></script>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8D%94%3C/text%3E%3C/svg%3E" />
  <style>[x-cloak] { display: none !important; }</style>
</head>
<body data-nav="settings" class="min-h-screen bg-slate-50 text-slate-800 font-sans antialiased">
  <div x-data="desktopBlocker" x-html="template()"></div>

  <header class="bg-white border-b border-slate-200">
    <div class="max-w-md mx-auto px-4 py-3">
      <h1 class="text-lg font-semibold text-slate-800">Settings</h1>
    </div>
  </header>

  <main class="max-w-md mx-auto px-4 py-4 pb-24 space-y-3">

    <section class="bg-white rounded-2xl p-4 border border-slate-200">
      <h2 class="text-xs uppercase tracking-wide text-slate-500 mb-2">Profile</h2>
      <p class="text-sm text-slate-400">Name + email + phone — Phase 5.</p>
    </section>

    <section class="bg-white rounded-2xl p-4 border border-slate-200">
      <h2 class="text-xs uppercase tracking-wide text-slate-500 mb-2">Bank (for payout)</h2>
      <p class="text-sm text-slate-400">Bank + account number + account name — Phase 5.</p>
    </section>

    <div class="space-y-2 pt-2">
      <button disabled class="w-full rounded-lg bg-orange-200 text-orange-700/60 px-4 py-2.5 text-sm font-semibold">Save Changes</button>
      <button disabled class="w-full rounded-lg border border-slate-200 px-4 py-2 text-sm text-slate-400">Change Password</button>
      <button disabled class="w-full rounded-lg border border-red-200 px-4 py-2 text-sm text-red-400">Logout</button>
    </div>

  </main>

  <div x-data="bottomnavAffiliate" x-html="template()"></div>
</body>
</html>
