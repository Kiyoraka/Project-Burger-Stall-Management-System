<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Sellers | BSMS Affiliate</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script defer src="/assets/js/core/format.js"></script>
  <script defer src="/assets/js/core/mock-data.js"></script>
  <script defer src="/assets/js/core/db.js"></script>
  <script defer src="/assets/js/core/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      if (window.auth && window.auth.requireRole) window.auth.requireRole('affiliate');
    });
  </script>
  <script defer src="/assets/js/components/desktop-blocker.js"></script>
  <script defer src="/assets/js/components/bottomnav-affiliate.js"></script>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8D%94%3C/text%3E%3C/svg%3E" />
  <style>[x-cloak] { display: none !important; }</style>
</head>
<body data-nav="users" class="min-h-screen bg-slate-50 text-slate-800 font-sans antialiased">
  <div x-data="desktopBlocker" x-html="template()"></div>

  <header class="bg-white border-b border-slate-200">
    <div class="max-w-md mx-auto px-4 py-3 flex items-center justify-between">
      <h1 class="text-lg font-semibold text-slate-800">My Sellers</h1>
      <button disabled class="w-9 h-9 rounded-full bg-slate-100 inline-flex items-center justify-center text-slate-400" aria-label="Add">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" /></svg>
      </button>
    </div>
  </header>

  <main class="max-w-md mx-auto px-4 py-4 pb-24 space-y-3">

    <input type="search" placeholder="Search sellers..." disabled
           class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm disabled:bg-slate-100" />

    <div class="bg-white rounded-2xl p-6 border border-slate-200 text-center text-sm text-slate-400">
      Referred sellers list wires up in Phase 5.
    </div>

  </main>

  <div x-data="bottomnavAffiliate" x-html="template()"></div>
</body>
</html>
