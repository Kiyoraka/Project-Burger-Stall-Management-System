<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found | BSMS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8D%94%3C/text%3E%3C/svg%3E" />
</head>
<body class="min-h-screen bg-gradient-to-br from-orange-50 via-amber-50 to-yellow-50 text-slate-800 font-sans antialiased">
  <main class="min-h-screen flex flex-col items-center justify-center px-6 py-12 text-center">
    <p class="text-8xl md:text-9xl font-extrabold text-orange-600 tracking-tight">404</p>
    <h1 class="mt-6 text-2xl md:text-3xl font-semibold text-slate-800">This page doesn't exist</h1>
    <p class="mt-3 text-sm md:text-base text-slate-500 max-w-md">
      The link may be broken, or the page may have been moved.
    </p>
    <a href="/index.html"
       class="mt-8 inline-flex items-center gap-2 rounded-full bg-orange-600 px-6 py-3 text-sm font-medium text-white shadow-sm transition hover:bg-orange-700">
      ← Go home
    </a>
  </main>
</body>
</html>
