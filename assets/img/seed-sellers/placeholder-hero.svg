<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" role="img" aria-label="Stall hero placeholder">
  <defs>
    <linearGradient id="hero-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="white" opacity="0.18"/>
    </pattern>
  </defs>
  <rect width="1200" height="400" fill="url(#hero-bg)"/>
  <rect width="1200" height="400" fill="url(#dots)"/>
  <text x="600" y="220" text-anchor="middle" font-size="140" font-family="Apple Color Emoji, Segoe UI Emoji, sans-serif">🍔</text>
  <text x="600" y="320" text-anchor="middle" font-size="22" fill="white" font-family="system-ui, sans-serif" font-weight="700" letter-spacing="6" opacity="0.85">YOUR STALL HERE</text>
</svg>
