<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seller Login | BSMS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8D%94%3C/text%3E%3C/svg%3E" />
  <style>[x-cloak] { display: none !important; }</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-orange-50 via-amber-50 to-yellow-50 text-slate-800 font-sans antialiased">
  <main class="min-h-screen flex flex-col items-center justify-center px-6 py-12">
    <div class="w-full max-w-sm">

      <div class="text-center mb-6">
        <span class="text-3xl" aria-hidden="true">🧑‍🍳</span>
        <h1 class="mt-2 text-2xl font-bold text-slate-800">Seller Login</h1>
        <p class="text-sm text-slate-500">Manage your burger stall</p>
      </div>

      <form class="bg-white rounded-2xl shadow-md p-6 space-y-4"
            x-data="{ email: '', password: '', error: '' }"
            @submit.prevent="error = 'Login wiring lands in Phase 2'">

        <div>
          <label for="email" class="block text-sm font-medium text-slate-700 mb-1">Email</label>
          <input id="email" type="email" required autocomplete="email"
                 x-model="email"
                 placeholder="seller1@bsms.test"
                 class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent" />
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Password</label>
          <input id="password" type="password" required autocomplete="current-password"
                 x-model="password"
                 placeholder="••••••••"
                 class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent" />
        </div>

        <p x-show="error" x-cloak class="text-sm text-amber-600" x-text="error"></p>

        <button type="submit"
                class="w-full rounded-lg bg-orange-600 px-4 py-2.5 text-sm font-semibold text-white hover:bg-orange-700 transition">
          Sign in
        </button>
      </form>

      <p class="mt-6 text-center text-sm text-slate-500">
        No account? Contact your affiliate or
        <a href="/admin/login.html" class="text-orange-600 hover:text-orange-700 underline">admin</a>.
      </p>

      <p class="mt-4 text-center text-xs text-slate-400">
        <a href="/index.html" class="hover:text-slate-600">← Back to home</a>
      </p>
    </div>
  </main>
</body>
</html>
