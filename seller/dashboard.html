<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard | BSMS Seller</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script defer src="/assets/js/core/format.js"></script>
  <script defer src="/assets/js/core/mock-data.js"></script>
  <script defer src="/assets/js/core/db.js"></script>
  <script defer src="/assets/js/core/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      if (window.auth && window.auth.requireRole) window.auth.requireRole('seller');
    });
  </script>
  <script defer src="/assets/js/components/topbar.js"></script>
  <script defer src="/assets/js/components/sidebar-seller.js"></script>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8D%94%3C/text%3E%3C/svg%3E" />
  <style>[x-cloak] { display: none !important; }</style>
</head>
<body data-nav="dashboard" class="min-h-screen bg-slate-50 text-slate-800 font-sans antialiased">
  <div class="flex min-h-screen">
    <div x-data="sidebarSeller" x-html="template()"></div>
    <div class="flex-1 flex flex-col min-w-0">
      <header class="bg-white border-b border-slate-200">
        <div class="px-6 py-4 flex items-center justify-between">
          <div>
            <h1 class="text-xl font-semibold text-slate-800">Dashboard</h1>
            <p class="text-xs text-slate-500">Today at a glance</p>
          </div>
          <div x-data="topbar" x-html="template()"></div>
        </div>
      </header>
      <main class="flex-1 p-6 space-y-6">

        <section class="grid grid-cols-1 sm:grid-cols-3 gap-4">
          <div class="bg-white rounded-xl p-5 border border-slate-200">
            <p class="text-xs uppercase tracking-wide text-slate-500">Today's Leads</p>
            <p class="mt-1 text-3xl font-bold text-slate-800">—</p>
          </div>
          <div class="bg-white rounded-xl p-5 border border-slate-200">
            <p class="text-xs uppercase tracking-wide text-slate-500">This Week</p>
            <p class="mt-1 text-3xl font-bold text-slate-800">—</p>
          </div>
          <div class="bg-white rounded-xl p-5 border border-slate-200">
            <p class="text-xs uppercase tracking-wide text-slate-500">Menu Items</p>
            <p class="mt-1 text-3xl font-bold text-slate-800">—</p>
          </div>
        </section>

        <section class="grid grid-cols-1 lg:grid-cols-2 gap-4">
          <div class="bg-white rounded-xl p-5 border border-slate-200">
            <h2 class="text-sm font-semibold text-slate-700 mb-3">Subscription</h2>
            <p class="text-sm text-slate-400">Phase 4 hydrates active period + renewal date.</p>
          </div>
          <div class="bg-white rounded-xl p-5 border border-slate-200">
            <h2 class="text-sm font-semibold text-slate-700 mb-3">Landing</h2>
            <p class="text-sm text-slate-400">Phase 4 surfaces public URL + View button.</p>
          </div>
        </section>

        <section class="bg-white rounded-xl p-5 border border-slate-200">
          <h2 class="text-sm font-semibold text-slate-700 mb-3">New Leads</h2>
          <p class="text-sm text-slate-400">Last 5 leads — Phase 4.</p>
        </section>

      </main>
    </div>
  </div>
</body>
</html>
